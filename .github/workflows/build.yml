name: Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            echo "VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          fi
          if [[ -n "${VERSION_CODE_FROM_VAR}" ]]; then
            echo "VERSION_CODE=${VERSION_CODE_FROM_VAR}" >> "$GITHUB_ENV"
          fi
        env:
          VERSION_CODE_FROM_VAR: ${{ vars.VERSION_CODE }}

      - name: Decode release keystore
        shell: bash
        run: |
          if [[ -z "$RELEASE_KEYSTORE_BASE64" ]]; then
            echo "No release keystore configured; release APK will be unsigned."
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/release.keystore"
          echo "RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/signing/release.keystore" >> "$GITHUB_ENV"
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Assemble release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
        shell: bash
        run: |
          prerelease_args=()
          if [[ "$GITHUB_REF_NAME" == *"-rc"* ]]; then
            prerelease_args+=(--prerelease)
          fi
          notes_args=(--notes "Automated Android release build for $GITHUB_REF_NAME.")
          if [[ -f "docs/release-notes/$GITHUB_REF_NAME.md" ]]; then
            notes_args=(--notes-file "docs/release-notes/$GITHUB_REF_NAME.md")
          fi
          gh release create "$GITHUB_REF_NAME" \
            app/build/outputs/apk/release/*.apk \
            --title "$GITHUB_REF_NAME" \
            "${notes_args[@]}" \
            "${prerelease_args[@]}"
        env:
          GH_TOKEN: ${{ github.token }}
